name: CI/CD Docker Pipeline

on:
  push:
    branches: [ "main" ] # Triggers the workflow on pushes to main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4 # Pulls your code into the runner

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3 # Optimizes builds

    - name: Build and Push Image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_HUB_USERNAME }}/my-app:latest

  deploy:
    needs: build-and-push # Only runs if the build step succeeds
    runs-on: ubuntu-latest
    
    steps:
    - name: Execute Remote SSH Commands
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/my-app:latest
          docker stop my-running-container || true
          docker rm my-running-container || true
          docker run -d --name my-running-container -p 80:80 ${{ secrets.DOCKER_HUB_USERNAME }}/my-app:latest
